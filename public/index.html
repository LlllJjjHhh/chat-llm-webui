<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat LLM WebUI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">
    <div id="app" class="flex h-screen w-full overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 bg-gray-100 dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 flex flex-col h-full hidden md:block">
            <div class="p-4 border-b border-gray-200 dark:border-gray-700">
                <h2 class="text-xl font-bold">Chat LLM</h2>
                <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">本地大模型聊天界面</p>
            </div>
            <div class="flex-1 p-4">
                <button onclick="clearChat()" class="w-full px-4 py-2 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-600">
                    🗑️ 清空对话
                </button>
            </div>
            <div class="p-4 border-t border-gray-200 dark:border-gray-700">
                <button onclick="toggleDark()" class="w-full px-4 py-2 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-600">
                    <span id="darkText">🌙 深色模式</span>
                </button>
            </div>
        </aside>

        <!-- Main Chat -->
        <main class="flex-1 flex flex-col h-full overflow-hidden">
            <div id="chatContainer" class="flex-1 overflow-y-auto p-4 md:p-6">
                <div class="h-full flex flex-col items-center justify-center text-center text-gray-500 dark:text-gray-400">
                    <h1 class="text-4xl font-bold mb-4 text-gray-700 dark:text-gray-200">Chat LLM WebUI</h1>
                    <p class="text-lg max-w-xl">本地大模型聊天界面，隐私安全，完全可控。开始你的对话吧！</p>
                </div>
            </div>

            <div class="border-t border-gray-200 dark:border-gray-800 p-4 bg-white dark:bg-gray-800">
                <form onsubmit="sendMessage(event)" class="max-w-4xl mx-auto flex gap-2">
                    <input id="inputText" type="text" placeholder="输入你的问题..." class="flex-1 px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <button type="submit" id="sendBtn" class="px-6 py-3 bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 text-white rounded-lg font-medium">发送</button>
                </form>
            </div>
        </main>

        <!-- Config Panel -->
        <aside class="w-72 bg-gray-100 dark:bg-gray-800 border-l border-gray-200 dark:border-gray-700 h-full overflow-y-auto hidden md:block">
            <div class="p-4 border-b border-gray-200 dark:border-gray-700">
                <h3 class="font-bold text-lg">参数配置</h3>
            </div>
            <div class="p-4 space-y-6">
                <div>
                    <label class="block text-sm font-medium mb-2">Temperature: <span id="tempValue">0.7</span></label>
                    <input id="temperature" type="range" min="0" max="2" step="0.05" value="0.7" class="w-full" oninput="document.getElementById('tempValue').textContent = this.value">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Top P: <span id="topValue">0.8</span></label>
                    <input id="top_p" type="range" min="0" max="1" step="0.05" value="0.8" class="w-full" oninput="document.getElementById('topValue').textContent = this.value">
                </div>
                <div>
                    <label class="block text-sm font-medium mb="2">最大长度: <span id="maxValue">2048</span></label>
                    <input id="max_new_tokens" type="range" min="128" max="4096" step="128" value="2048" class="w-full" oninput="document.getElementById('maxValue').textContent = this.value">
                </div>
            </div>
        </aside>
    </div>

    <script>
        let messages = [];
        let isLoading = false;
        let darkMode = false;

        // Check system preference
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            toggleDark();
        }

        function toggleDark() {
            darkMode = !darkMode;
            if (darkMode) {
                document.documentElement.classList.add('dark');
                document.getElementById('darkText').textContent = '☀️ 浅色模式';
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('darkText').textContent = '🌙 深色模式';
            }
        }

        function clearChat() {
            messages = [];
            document.getElementById('chatContainer').innerHTML = `
                <div class="h-full flex flex-col items-center justify-center text-center text-gray-500 dark:text-gray-400">
                    <h1 class="text-4xl font-bold mb-4 text-gray-700 dark:text-gray-200">Chat LLM WebUI</h1>
                    <p class="text-lg max-w-xl">本地大模型聊天界面，隐私安全，完全可控。开始你的对话吧！</p>
                </div>
            `;
        }

        function scrollToBottom() {
            const container = document.getElementById('chatContainer');
            container.scrollTop = container.scrollHeight;
        }

        function addMessage(role, content, isStreaming = false) {
            const container = document.getElementById('chatContainer');
            // Remove welcome if exists
            if (messages.length === 0) {
                container.innerHTML = '';
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = `mb-6 flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.id = `msg-${messages.length}`;
            contentDiv.className = `max-w-[85%] rounded-2xl px-5 py-3 ${
                role === 'user' 
                ? 'bg-blue-600 text-white rounded-br-sm' 
                : 'bg-gray-200 dark:bg-gray-800 rounded-bl-sm'
            }`;
            contentDiv.textContent = content;
            
            messageDiv.appendChild(contentDiv);
            container.appendChild(messageDiv);
            messages.push({ role, content, elementId: `msg-${messages.length}` });
            scrollToBottom();
        }

        function sendMessage(e) {
            e.preventDefault();
            if (isLoading) return;

            const input = document.getElementById('inputText');
            const text = input.value.trim();
            if (!text) return;

            addMessage('user', text);
            input.value = '';
            isLoading = true;
            document.getElementById('sendBtn').disabled = true;

            // Add assistant message placeholder
            addMessage('assistant', '');
            const lastMsgId = messages[messages.length - 1].elementId;

            const temperature = parseFloat(document.getElementById('temperature').value);
            const top_p = parseFloat(document.getElementById('top_p').value);
            const max_new_tokens = parseInt(document.getElementById('max_new_tokens').value);

            let fullText = '';
            const eventSource = new EventSource(`/api/chat?messages=${encodeURIComponent(JSON.stringify(messages))}&temperature=${temperature}&max_new_tokens=${max_new_tokens}&top_p=${top_p}`);

            eventSource.onmessage = (event) => {
                const data = JSON.parse(event.data);
                fullText += data.text;
                document.getElementById(lastMsgId).textContent = fullText;
                scrollToBottom();
            };

            eventSource.onerror = () => {
                eventSource.close();
                isLoading = false;
                document.getElementById('sendBtn').disabled = false;
                messages[messages.length - 1].content = fullText;
            };
        }
    </script>
</body>
</html>
