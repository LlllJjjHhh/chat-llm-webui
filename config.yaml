# Model configuration
model:
  name: "Qwen/Qwen-7B-Chat"
  path: null  # Use null to download from HuggingFace, or set your local path
  device: "cuda"  # options: cuda, cpu, auto
  auto_load: true

# Generation parameters
generation:
  temperature: 0.7
  max_new_tokens: 2048
  top_p: 0.8
  repetition_penalty: 1.1

# Server configuration
server:
  host: "0.0.0.0"
  port: 5000
  debug: false
